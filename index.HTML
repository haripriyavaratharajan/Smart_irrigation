<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AquaFarm – Smart Irrigation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --g1:#00ff88;--g2:#00e070;--g3:#00b858;--g4:#008040;
  --teal:#00d4aa;--lime:#a8ff3e;--gold:#ffcc00;--sky:#38bdf8;--coral:#ff6b6b;--amber:#ffaa00;
  --bg:#040d07;--bg2:#071209;
  --sur:rgba(0,255,136,.04);--sur2:rgba(0,255,136,.08);--sur3:rgba(0,255,136,.13);
  --bd:rgba(0,255,136,.14);--bd2:rgba(0,255,136,.28);
  --tx:#e8fff2;--tx2:#7ab88a;--tx3:#4a7a5a;
  --shad:rgba(0,255,136,.14);--card:rgba(4,20,9,.82);
  --sb:rgba(2,10,5,.96);--tb:rgba(4,13,7,.93);--inp:rgba(0,255,136,.07);
}
[data-theme="light"]{
  --g1:#007a36;--g2:#006a2e;--g3:#005825;--teal:#009980;--gold:#b88a00;
  --bg:#f0faf3;--bg2:#e2f5e9;
  --sur:rgba(0,120,60,.05);--sur2:rgba(0,120,60,.09);--sur3:rgba(0,120,60,.14);
  --bd:rgba(0,120,60,.18);--bd2:rgba(0,120,60,.32);
  --tx:#0a2614;--tx2:#2e6040;--tx3:#7aaa8a;
  --shad:rgba(0,120,60,.12);--card:rgba(255,255,255,.88);
  --sb:rgba(240,250,243,.97);--tb:rgba(240,250,243,.95);--inp:rgba(0,120,60,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.5;transition:background .25s,color .2s}
h1,h2,h3{font-family:'Playfair Display',serif;line-height:1.15}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g4);border-radius:4px}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:256px;min-width:256px;background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:200;backdrop-filter:blur(20px)}
.main{margin-left:256px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:64px;background:var(--tb);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 22px;gap:11px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.content{padding:24px;flex:1}

/* SIDEBAR */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-ico{width:38px;height:38px;background:linear-gradient(135deg,var(--g1),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 3px 12px rgba(0,255,136,.3)}
.sb-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--g1)}
.sb-tag{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.sb-nav{flex:1;padding:10px 9px;overflow-y:auto}
.sb-sec{margin-bottom:18px}
.sb-sec-t{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);padding:0 9px;margin-bottom:4px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:1px;transition:all .16s}
.sb-item:hover{background:var(--sur2);color:var(--tx)}
.sb-item.act{background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(0,212,170,.09));color:var(--g1);border:1px solid var(--bd2)}
.sb-item .ico{font-size:16px;width:20px;text-align:center}
.sb-bdg{margin-left:auto;background:var(--coral);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:700}
.sb-user{padding:11px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:9px;cursor:pointer}
.sb-ava{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0}

/* TOPBAR */
.tb-t{font-size:16px;font-weight:700;flex:1}
.tb-live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g1);font-weight:600;background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2);padding:4px 10px;border-radius:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--g1);animation:blink 1.5s ease infinite;box-shadow:0 0 6px var(--g1)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.tb-btn{width:34px;height:34px;border-radius:9px;background:var(--sur);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .16s;color:var(--tx2)}
.tb-btn:hover{background:var(--sur3);color:var(--g1)}
.tog{width:64px;height:30px;border-radius:20px;background:var(--sur2);border:1px solid var(--bd2);cursor:pointer;position:relative;display:flex;align-items:center;padding:2px}
.tog-th{width:25px;height:25px;border-radius:14px;background:linear-gradient(135deg,var(--g1),var(--teal));display:flex;align-items:center;justify-content:center;font-size:12px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
[data-theme="light"] .tog-th{transform:translateX(34px)}
.lsel{background:var(--sur);border:1px solid var(--bd);color:var(--tx);padding:5px 8px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;cursor:pointer;outline:none}
.lsel option{background:var(--bg2)}

/* PAGE HEADER */
.ph{margin-bottom:22px}
.ph h1{font-size:25px;font-weight:900;margin-bottom:3px}
.ph p{color:var(--tx2);font-size:13px}
.ph-tag{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(0,255,136,.09),rgba(0,212,170,.06));border:1px solid rgba(0,255,136,.2);border-radius:20px;padding:3px 12px;font-size:10px;color:var(--g1);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}

/* CARD */
.card{background:var(--card);border:1px solid var(--bd);border-radius:15px;padding:17px;backdrop-filter:blur(14px);transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--bd2)}
.ct{font-size:13px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:6px;color:var(--tx)}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-bottom:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* STAT CARD */
.sc{border-radius:15px;padding:17px;border:1px solid transparent;transition:all .22s;position:relative;overflow:hidden}
.sc:hover{transform:translateY(-2px);box-shadow:0 6px 24px var(--shad)}
.sc-v{font-family:'Playfair Display',serif;font-size:27px;font-weight:900;line-height:1;margin-bottom:3px}
.sc-l{font-size:11px;color:var(--tx2);font-weight:500}
.sc-chg{font-size:11px;margin-top:6px;font-weight:600}
.sc-gl{position:absolute;bottom:-24px;right:-24px;width:80px;height:80px;border-radius:50%;opacity:.16;filter:blur(20px);pointer-events:none}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .16s;text-decoration:none}
.btn-p{background:linear-gradient(135deg,var(--g3),var(--teal));color:#fff;box-shadow:0 3px 14px rgba(0,200,130,.28)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,200,130,.38)}
.btn-o{background:var(--sur);border:1px solid var(--bd2);color:var(--tx2)}
.btn-o:hover{border-color:var(--g1);color:var(--g1)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:8px}
.btn-full{width:100%;justify-content:center}

/* FORM */
.field{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px}
.req{color:var(--coral);font-size:13px}
.iw{position:relative}
.iw .fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.iw .fe{position:absolute;right:11px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:14px;user-select:none}
input.inp,select.inp{background:var(--inp);border:1.5px solid var(--bd);border-radius:10px;padding:11px 12px;color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;width:100%;outline:none;transition:all .16s}
input.inp:focus,select.inp:focus{border-color:var(--g1);box-shadow:0 0 0 3px rgba(0,255,136,.08)}
input.inp::placeholder{color:var(--tx3)}
.iw input.inp,.iw select.inp{padding-left:38px}
select.inp option{background:var(--bg2);color:var(--tx)}
.inp-err{border-color:var(--coral)!important;box-shadow:0 0 0 3px rgba(255,107,107,.1)!important}
.ferr{font-size:11px;color:var(--coral);margin-top:3px;font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--sur2);outline:none;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--g1);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 7px rgba(0,255,136,.4)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg{background:rgba(0,255,136,.09);color:var(--g1);border:1px solid rgba(0,255,136,.22)}
.br{background:rgba(255,107,107,.09);color:var(--coral);border:1px solid rgba(255,107,107,.22)}
.by{background:rgba(255,204,0,.09);color:var(--gold);border:1px solid rgba(255,204,0,.22)}
.bs{background:rgba(56,189,248,.09);color:var(--sky);border:1px solid rgba(56,189,248,.22)}
.bt{background:rgba(0,212,170,.09);color:var(--teal);border:1px solid rgba(0,212,170,.22)}

/* PROGRESS */
.prog{background:var(--sur2);border-radius:20px;height:6px;overflow:hidden}
.prog-f{height:100%;border-radius:20px;transition:width .8s ease}

/* ALERT ROWS */
.arow{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;border-radius:11px;margin-bottom:8px;border:1px solid transparent}
.a-crit{background:rgba(255,107,107,.06);border-color:rgba(255,107,107,.2)}
.a-warn{background:rgba(255,204,0,.06);border-color:rgba(255,204,0,.2)}
.a-info{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.2)}
.a-ok{background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2)}

/* CHARTS */
.cbox{position:relative;height:205px}

/* TABLE */
.twrap{overflow-x:auto;border-radius:12px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);border-bottom:1px solid var(--bd);font-weight:700;background:var(--sur)}
tbody td{padding:10px 13px;font-size:12px;border-bottom:1px solid rgba(0,255,136,.04);color:var(--tx2)}
tbody tr:hover td{background:var(--sur);color:var(--tx)}
tbody tr:last-child td{border:none}

/* ZONE MAP */
.z-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.zone{border-radius:12px;padding:13px;min-height:85px;position:relative;overflow:hidden;transition:all .2s;cursor:default}
.zone:hover{transform:scale(1.03)}
.z-a{background:linear-gradient(135deg,rgba(0,255,136,.15),rgba(0,212,170,.09));border:1.5px solid rgba(0,255,136,.3)}
.z-d{background:linear-gradient(135deg,rgba(255,204,0,.13),rgba(255,170,0,.07));border:1.5px solid rgba(255,204,0,.28)}
.z-i{background:var(--sur);border:1.5px solid var(--bd)}

/* PRED */
.ptabs{display:flex;gap:6px;background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:4px;margin-bottom:16px}
.ptab{flex:1;padding:9px;border-radius:9px;text-align:center;cursor:pointer;font-weight:700;font-size:12px;color:var(--tx2);transition:.2s}
.ptab.act{background:linear-gradient(135deg,var(--g3),var(--teal));color:#fff}

/* WEATHER */
.w7{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.wday{text-align:center;padding:12px 5px;border-radius:12px;background:var(--card);border:1px solid var(--bd);transition:.2s}
.wday:hover{border-color:var(--sky);transform:translateY(-3px)}

/* TOGGLE */
.togrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.tog2{position:relative;width:42px;height:23px;flex-shrink:0}
.tog2 input{display:none}
.tog2-track{position:absolute;inset:0;border-radius:12px;background:var(--sur2);border:1px solid var(--bd);transition:.25s;cursor:pointer}
.tog2-thumb{position:absolute;width:17px;height:17px;border-radius:50%;top:2px;left:2px;background:var(--tx3);transition:.25s;cursor:pointer}
.tog2 input:checked~.tog2-track{background:linear-gradient(135deg,var(--g3),var(--teal));border-color:var(--g1)}
.tog2 input:checked~.tog2-thumb{left:21px;background:#fff}

/* USER ROW */
.urow{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;background:var(--sur);margin-bottom:6px;border:1px solid transparent;transition:.16s}
.urow:hover{background:var(--sur2);border-color:var(--bd)}
.uava{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes glow{0%,100%{box-shadow:0 0 14px rgba(0,255,136,.22)}50%{box-shadow:0 0 30px rgba(0,255,136,.5)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.fu{animation:fadeUp .35s ease both}
.a2{animation-delay:.08s}.a3{animation-delay:.14s}.a4{animation-delay:.2s}

/* ============================================================
   LANDING PAGE
============================================================ */
.land{min-height:100vh;overflow:hidden}
[data-theme="dark"] .land{background:radial-gradient(ellipse at 18% 18%,rgba(0,80,42,.4) 0%,transparent 56%),radial-gradient(ellipse at 82% 82%,rgba(0,58,78,.32) 0%,transparent 56%),#040d07}
[data-theme="light"] .land{background:radial-gradient(ellipse at 18% 18%,rgba(0,180,90,.1) 0%,transparent 56%),radial-gradient(ellipse at 82% 82%,rgba(0,150,120,.08) 0%,transparent 56%),#f0faf3}
.land-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 52px}
.land-hero{padding:68px 52px 52px;max-width:1140px;margin:0 auto;display:flex;gap:52px;align-items:center}
.hero-eye{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(0,255,136,.1),rgba(0,212,170,.07));border:1px solid rgba(0,255,136,.22);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--g1);font-weight:700;margin-bottom:20px;letter-spacing:.4px}
.hero-h1{font-size:62px;font-weight:900;line-height:1.07;margin-bottom:16px}
.hero-acc{background:linear-gradient(135deg,var(--g1),var(--teal),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-glow{background:linear-gradient(135deg,var(--g1),var(--lime));color:#001a08;font-weight:800;box-shadow:0 4px 20px rgba(0,255,136,.38);font-size:14px;padding:13px 28px;border-radius:12px}
.btn-glow:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,255,136,.5)}
.feats{padding:36px 52px 68px;max-width:1140px;margin:0 auto}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.feat-card{background:var(--card);border:1px solid var(--bd);border-radius:15px;padding:22px;transition:all .25s}
.feat-card:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:0 9px 32px var(--shad)}
.land-foot{text-align:center;padding:32px;border-top:1px solid var(--bd);color:var(--tx3);font-size:12px}

/* ============================================================
   AUTH PAGES — Sign In & Register
============================================================ */
.auth-page{min-height:100vh;display:flex;background:var(--bg);overflow:hidden}
[data-theme="dark"] .auth-page{background:radial-gradient(ellipse at 8% 30%,rgba(0,80,42,.42) 0%,transparent 50%),radial-gradient(ellipse at 92% 70%,rgba(0,50,68,.38) 0%,transparent 50%),#040d07}
[data-theme="light"] .auth-page{background:radial-gradient(ellipse at 8% 30%,rgba(0,180,90,.09) 0%,transparent 50%),radial-gradient(ellipse at 92% 70%,rgba(0,150,120,.07) 0%,transparent 50%),#f0faf3}

/* Left brand panel */
.auth-brand{width:400px;min-width:360px;background:linear-gradient(160deg,rgba(0,100,50,.22),rgba(0,60,80,.18));border-right:1px solid var(--bd);padding:38px 40px;display:flex;flex-direction:column;position:relative;overflow:hidden}
[data-theme="light"] .auth-brand{background:linear-gradient(160deg,rgba(0,180,90,.07),rgba(0,140,110,.05))}
.auth-brand::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(var(--g3),transparent);opacity:.07;top:-70px;right:-70px;pointer-events:none}
.brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;cursor:pointer}
.brand-ico{width:42px;height:42px;background:linear-gradient(135deg,var(--g1),var(--teal));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 16px rgba(0,255,136,.35);animation:glow 3s ease infinite}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--g1)}
.brand-tagline{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.brand-h{font-size:33px;font-weight:900;line-height:1.16;margin-bottom:12px}
.brand-acc{background:linear-gradient(135deg,var(--g1),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-size:13px;color:var(--tx2);line-height:1.85;margin-bottom:32px}
.bst-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}
.bst{background:rgba(0,255,136,.07);border:1px solid rgba(0,255,136,.14);border-radius:11px;padding:13px;text-align:center}
[data-theme="light"] .bst{background:rgba(0,180,90,.06)}
.bst-ico{font-size:20px;margin-bottom:4px}
.bst-v{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--g1);line-height:1}
.bst-l{font-size:10px;color:var(--tx2);margin-top:2px}
.brand-foot{margin-top:26px;font-size:11px;color:var(--tx3);border-top:1px solid var(--bd);padding-top:14px}

/* Right form panel */
.auth-form{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.auth-topbar{padding:16px 40px;display:flex;align-items:center;justify-content:flex-end;gap:10px;border-bottom:1px solid var(--bd)}
.auth-body{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 40px}
.auth-card{width:100%;max-width:440px}
.auth-h{font-size:28px;font-weight:900;margin-bottom:5px}
.auth-sub{font-size:13px;color:var(--tx2);margin-bottom:24px}

/* Alert banners */
.banner{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:14px;display:none}
.b-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.28);color:var(--coral)}
.b-ok{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.24);color:var(--g1)}

/* Demo accounts section */
.demo-section{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:13px;margin-top:16px}
.demo-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);font-weight:700;margin-bottom:10px}
.demo-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:.16s;border:1px solid transparent}
.demo-row:hover{background:var(--sur2);border-color:var(--bd2)}
.demo-ava{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.demo-name{font-size:13px;font-weight:700}

/* ── GAUGE SVG ────────────────────────────────────────────── */
function gauge(v,max,color,label){
  const r=50,c=2*Math.PI*r,p=v/max;
  return`<div style="text-align:center;padding:8px 0">
    <svg width="135" height="100" viewBox="0 0 116 92" style="transform:rotate(-90deg);overflow:visible">
      <circle cx="58" cy="62" r="${r}" fill="none" stroke="rgba(0,255,136,.07)" stroke-width="9"
        stroke-dasharray="${c*.75} ${c*.25}" stroke-dashoffset="${-c*.125}"/>
      <circle cx="58" cy="62" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${c*.75} ${c*.25}"
        stroke-dashoffset="${-(c*.125)+(c*.75)-(c*.75*p)}"
        style="filter:drop-shadow(0 0 7px ${color});transition:stroke-dashoffset 1s ease"/>
    </svg>
    <div style="margin-top:-48px">
      <div style="font-family:'Playfair Display',serif;font-size:23px;font-weight:900;color:${color}">${v}${max<=100?'%':''}</div>
      <div style="font-size:11px;color:var(--tx2);margin-top:2px">${label}</div>
    </div>
  </div>`;
}

/* SIGN IN */
function doLogin(){
  const raw = V('liU').trim().toLowerCase();
  const pw  = V('liP');

  // Basic empty checks
  if(!raw){ showBanner('liBanner','err','Please enter your username or email address.'); return; }
  if(!pw){  showBanner('liBanner','err','Please enter your password.'); return; }

  // Find user
  const users = getAllUsers();
  const match = users.find(u =>
    u.username.toLowerCase()===raw || u.email.toLowerCase()===raw
  );

  if(!match){
    showBanner('liBanner','err','❌  No account found with that username or email. Please register first.');
    shakeForm(); return;
  }
  if(match.pw!==pw && match.password!==pw){
    showBanner('liBanner','err','❌  Wrong password. Please try again.');
    shakeForm(); return;
  }

  // ✅ SUCCESS — log in
  G.user = {...match};
  if(CK('liRem')){
    try{ localStorage.setItem('aqf_sess',JSON.stringify({u:match.username,ts:Date.now()})); }catch(e){}
  }
  G.page='dashboard'; killCH(); render();
}

/* Quick demo login — click a demo row */
function quickLogin(username){
  const found = getAllUsers().find(u=>u.username===username);
  if(found){ G.user={...found}; G.page='dashboard'; killCH(); render(); }
}

/* REGISTER */
function doRegister(){
  const name     = V('rgName').trim();
  const username = V('rgUser').trim();
  const email    = V('rgEmail').trim().toLowerCase();
  const farm     = V('rgFarm').trim() || 'My Farm';
  const role     = V('rgRole') || 'Farmer';
  const pw       = V('rgPw');
  const pw2      = V('rgPw2');
  const agreed   = CK('rgAgree');

  const E={};

  // --- Validation ---
  if(name.length<2)
    E.name='Full name must be at least 2 characters.';

  if(username.length<3)
    E.username='Username must be at least 3 characters.';
  else if(!/^[a-zA-Z0-9_]+$/.test(username))
    E.username='Only letters, numbers and underscore (_) are allowed.';

  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))
    E.email='Please enter a valid email address (e.g. you@example.com).';

  if(!pw || pw.length<6)
    E.password='Password must be at least 6 characters long.';
  else if(!/[A-Z]/.test(pw))
    E.password='Password must contain at least one uppercase letter (A–Z).';
  else if(!/[0-9]/.test(pw))
    E.password='Password must contain at least one number (0–9).';

  if(pw && pw2 && pw!==pw2)
    E.confirm='Passwords do not match. Please re-enter.';

  // Duplicate checks
  const allUsers = getAllUsers();
  if(!E.username && allUsers.find(u=>u.username.toLowerCase()===username.toLowerCase()))
    E.username='This username is already taken. Please choose a different one.';
  if(!E.email && allUsers.find(u=>u.email.toLowerCase()===email))
    E.email='An account with this email already exists.';

  // If there are validation errors — re-render the page (shows red fields)
  if(Object.keys(E).length>0){
    G.regErr=E;
    render();
    // Show top banner after render
    setTimeout(()=>showBanner('rgBanner','err','⚠️  Please fix the errors highlighted below.'),30);
    return;
  }

  // Terms not accepted
  if(!agreed){
    showBanner('rgBanner','err','Please tick the checkbox to agree and continue.');
    return;
  }

  // ✅ Create account
  const newUser={
    id:Date.now(), username, pw, password:pw,
    name, role, email, farm,
    color:rColor(), ini:mkIni(name),
  };
  saveNewUser(newUser);
  G.regErr={};

  // Show success, then redirect to login after 2 seconds
  render();
  setTimeout(()=>{
    showBanner('rgOkBanner','ok',`✅  Account created for "${name}"! Taking you to Sign In…`);
  },30);
  setTimeout(()=>{ G.page='login'; render(); },2200);
}

/* LOGOUT */
function doLogout(){
  G.user=null; G.page='login'; G.regErr={};
  try{ localStorage.removeItem('aqf_sess'); }catch(e){}
  killCH(); render();
}

/* Helpers */
function showBanner(id,type,msg){
  const el=$(id); if(!el)return;
  el.className='banner '+(type==='ok'?'b-ok':'b-err');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>{ if(el)el.style.display='none'; },5000);
}
function shakeForm(){
  const el=document.querySelector('.auth-form');
  if(el){ el.style.animation='shake .4s ease'; setTimeout(()=>{if(el)el.style.animation='';},450); }
}
function toggleEye(key){
  const map={li:'liP',rg:'rgPw',rg2:'rgPw2'};
  const emap={li:'liEye',rg:'rgEye',rg2:'rg2Eye'};
  G.showPw[key]=!G.showPw[key];
  const inp=$(map[key]); if(inp) inp.type=G.showPw[key]?'text':'password';
  const eye=$(emap[key]); if(eye) eye.textContent=G.showPw[key]?'🙈':'👁️';
}
function livePwStr(pw){
  const bar=$('pwBar'); if(!bar)return;
  let s=0;
  if(pw.length>=6)s++;if(pw.length>=10)s++;
  if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const cols=['','#ff6b6b','#ffaa00','#ffcc00','#00d4aa','#00ff88'];
  const labs=['','Too Short','Weak','Fair','Strong','Very Strong'];
  bar.innerHTML=pw?`
    <div class="pw-segs">
      ${[1,2,3,4,5].map(i=>`<div class="pw-seg" style="background:${i<=s?cols[s]:'rgba(255,255,255,.09)'}"></div>`).join('')}
    </div>
    <div style="font-size:11px;font-weight:700;color:${cols[s]};margin-top:3px">${labs[s]}</div>`:'';
}
function liveMatch(){
  const hint=$('matchHint'); if(!hint)return;
  const a=V('rgPw'), b=V('rgPw2');
  if(!b){hint.innerHTML='';return;}
  hint.innerHTML=a===b
    ?'<span style="color:var(--g1)">✓ Passwords match</span>'
    :'<span style="color:var(--coral)">✗ Passwords do not match</span>';
}

        ${[['m','Soil Moisture','%',0,100,disp.m,'var(--teal)'],['t','Temperature','°C',0,50,disp.t,'#ff9955'],['h','Humidity','%',0,100,disp.h,'var(--sky)'],['tank','Tank Level','%',0,100,disp.tank,'var(--g1)'],['rain','Rain Probability','%',0,100,disp.rain,'var(--sky)']].map(([k,l,u,mn,mx,v,c])=>`
          <div class="field">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <label class="fl" style="margin:0">${l}</label>
              <span style="font-size:12px;color:${c};font-weight:800" id="pv${k}">${v}${u}</span>
            </div>
            <input type="range" min="${mn}" max="${mx}" value="${v}"
              ${G.predMode==='sensor'?'disabled style="opacity:.4;cursor:not-allowed"':''}
              oninput="updPred('${k}',this.value,'${u}')"/>
          </div>`).join('')}
        <button class="btn btn-p btn-full" style="padding:12px;font-size:14px;margin-top:6px" onclick="runPred()">🤖 Generate Recommendation</button>
      </div>
      <div class="fu a2">
        ${G.predRes?`
          <div style="padding:22px;border-radius:14px;text-align:center;margin-bottom:13px;${G.predRes.go?'background:linear-gradient(135deg,rgba(0,255,136,.09),rgba(0,212,170,.06));border:1px solid rgba(0,255,136,.22)':'background:linear-gradient(135deg,rgba(255,107,107,.09),rgba(255,80,80,.05));border:1px solid rgba(255,107,107,.22)'}">
            <div style="font-size:50px;margin-bottom:9px">${G.predRes.go?'💧':'🌿'}</div>
            <div style="font-size:26px;font-weight:900;font-family:'Playfair Display',serif;color:${G.predRes.go?'var(--g1)':'var(--coral)'};margin-bottom:5px">${G.predRes.go?'IRRIGATE NOW':'SKIP IRRIGATION'}</div>
            <div style="font-size:12px;color:var(--tx2);max-width:300px;margin:0 auto 14px;line-height:1.6">${G.predRes.reason}</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
              ${[['Water Needed',G.predRes.water,'var(--teal)'],['Duration',G.predRes.dur,'var(--sky)'],['Pump',G.predRes.pump,G.predRes.go?'var(--g1)':'var(--coral)']].map(([l,v,c])=>`
                <div style="background:rgba(0,0,0,.18);border-radius:10px;padding:10px;text-align:center">
                  <div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:${c};margin-bottom:2px">${v}</div>
                  <div style="font-size:10px;color:var(--tx2)">${l}</div>
                </div>`).join('')}
            </div>
            <div style="margin-top:11px;font-size:11px;color:var(--tx2)">Confidence: <strong>${G.predRes.conf}%</strong></div>
          </div>`:`
          <div class="card" style="text-align:center;padding:44px;margin-bottom:13px">
            <div style="font-size:60px;opacity:.15;margin-bottom:13px">🤖</div>
            <div style="font-size:15px;font-weight:800;font-family:'Playfair Display',serif;margin-bottom:6px">Awaiting Input</div>
            <div style="color:var(--tx2);font-size:13px">Set parameters and click Generate.</div>
          </div>`}
      </div>
    </div>
  </div>`;
}
function setPredMode(m){ G.predMode=m; G.predRes=null; if(m==='sensor') syncPred(); killCH(); render(); }
function syncPred(){ const s=G.sensor; G.predIn={m:Math.round(s.m),t:Math.round(s.t),h:Math.round(s.h),tank:Math.round(s.tank),rain:Math.round(s.rain)}; render(); }
function updPred(k,v,u){ G.predIn[k]=parseInt(v); const el=$('pv'+k); if(el) el.textContent=v+u; }
function runPred(){
  const p=G.predIn; const thr=G.sets.thr;
  const go=p.m<thr&&p.rain<30&&p.tank>20;
  const def=Math.max(0,thr-p.m); const w=go?Math.round(def*2.5):0; const d=go?Math.round(w/3.2):0;
  const conf=go?Math.min(99,Math.round(((thr-p.m)/thr*.5+(1-p.rain/100)*.3+(p.tank/100)*.2)*100)):0;
  G.predRes={go,water:w+'L',dur:d+' min',pump:go?'ON':'OFF',conf,
    reason:go?`Moisture (${p.m}%) is below threshold (${thr}%) and rain probability is low (${p.rain}%).`
             :`Moisture (${p.m}%) is sufficient, or rain is expected (${p.rain}%).`};
  killCH(); render();
}

function pCalc(){

        <div class="field"><label class="fl">Crop Type</label><select class="inp" id="fCrop"><option>Rice</option><option>Wheat</option><option>Cotton</option><option>Corn</option><option>Sugarcane</option><option>Soybean</option></select></div>
        <div class="field"><label class="fl">Soil Type</label><select class="inp" id="fSoil"><option>Clay</option><option>Sandy</option><option>Loamy</option><option>Silt</option></select></div>
        <div class="field"><label class="fl">Current Moisture (%)</label><input class="inp" id="fMst" type="number" value="45" min="0" max="100"/></div>
        <button class="btn btn-p btn-full" style="padding:12px" onclick="doCalc()">⚡ Calculate</button>

function doCalc(){
  const sz=parseFloat(V('fSz'))||5, crop=V('fCrop')||'Rice', soil=V('fSoil')||'Loamy', mst=parseFloat(V('fMst'))||45;
  const cf={Rice:6,Wheat:4,Cotton:5,Corn:5,Sugarcane:8,Soybean:4}[crop]||5;
  const sf={Clay:.8,Sandy:1.3,Loamy:1,Silt:.9}[soil]||1;
  const def=Math.max(0,70-mst)/100, water=Math.round(sz*cf*sf*def*1000), dur=Math.round(water/3.2);
  const el=$('calcOut');
  if(el) el.innerHTML=`<div class="ct">📊 Results</div>
    <div class="g2" style="margin:0 0 13px">
      ${[['Water Required',water+'L','var(--teal)'],['Pump Duration',dur+' min','var(--sky)'],['Coverage',sz+' acres','var(--g1)'],['Efficiency','87%','var(--gold)']].map(([l,v,c])=>`
        <div style="background:var(--sur2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--bd)">
          <div style="font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:${c};margin-bottom:3px">${v}</div>
          <div style="font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase">${l}</div>
        </div>`).join('')}
    </div>
    <div style="padding:10px;background:rgba(0,255,136,.04);border-radius:9px;border:1px solid rgba(0,255,136,.12);font-size:12px;color:var(--tx2)">
      💡 <strong>${crop}</strong> on <strong>${soil}</strong> soil · Moisture deficit: <strong style="color:var(--gold)">${Math.round(def*100)}%</strong>
    </div>`;
}

        Built during a hackathon to tackle water wastage in agriculture. AquaFarm combines real-time IoT sensor data with an AI prediction engine so farmers can decide <em>when</em>, <em>where</em>, and <em>how much</em> to irrigate — cutting waste by up to 40%.
      </p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <span class="badge bg">🏆 Hackathon 2025</span>
        <span class="badge bs">Smart Agriculture</span>
        <span class="badge by">IoT + AI</span>
        <span class="badge bt">Zero Install</span>
      </div>
    </div>
    <div class="g2" style="margin-bottom:16px">
      <div class="card fu">
        <div class="ct">❓ Why We Built This</div>
        <p style="font-size:13px;color:var(--tx2);line-height:1.9;margin-bottom:10px">Agriculture uses over <strong style="color:var(--g1)">80% of freshwater</strong> in India, yet nearly <strong style="color:var(--coral)">40–50% is wasted</strong> through over-irrigation and fixed schedules with no sensor data.</p>
        <p style="font-size:13px;color:var(--tx2);line-height:1.9">Most small farmers have no access to real-time soil or weather data. AquaFarm fixes this with a simple, zero-install web interface that runs in any browser.</p>
      </div>
      <div class="card fu a2">
        <div class="ct">🛠️ Technology Used</div>
        ${[['Frontend','HTML5 + CSS3 + Vanilla JS (single file, zero install)'],['Charts','Chart.js 4.4 (CDN)'],['Backend','Python FastAPI + Uvicorn'],['AI Logic','Rule-based threshold + water deficit model'],['User Storage','Browser localStorage — no server needed'],['Fonts','Playfair Display + Plus Jakarta Sans']].map(([l,v])=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--bd);display:flex;gap:11px">
            <span style="font-size:11px;font-weight:700;color:var(--tx);min-width:82px;flex-shrink:0">${l}</span>
            <span style="font-size:12px;color:var(--tx2)">${v}</span>

      </div>
    </div>
    <div class="card fu">
      <div class="ct">🏅 What This App Covers — All 12 Pages</div>

           ['📡','Sensors','Animated SVG gauges and live line charts for all sensor nodes.'],
           ['🤖','AI Prediction','Two modes — sensor auto-fetch & manual sliders — with irrigation decision and confidence score.'],

}

            <div style="display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--bd);font-size:11px">

/* ============================================================
   RENDER ENGINE
============================================================ */
function render(){
  document.documentElement.setAttribute('data-theme',G.theme);
  const app=document.getElementById('app');

  // Public pages (no login needed)
  if(G.page==='landing'){ app.innerHTML=pLanding(); return; }
  if(G.page==='login'){   app.innerHTML=pLogin();   return; }
  if(G.page==='register'){app.innerHTML=pRegister();return; }

  // Protected pages — redirect to login if not signed in
  if(!G.user){ G.page='login'; app.innerHTML=pLogin(); return; }

  const PAGES={dashboard:pDash,sensors:pSensors,prediction:pPred,map:pMap,
    calculator:pCalc,weather:pWeather,history:pHistory,analytics:pAnalytics,
    alerts:pAlerts,settings:pSettings,about:pAbout,admin:pAdmin};
  const TITLES={dashboard:T('dashboard'),sensors:T('sensors'),prediction:T('prediction'),
    map:T('map'),calculator:T('calc'),weather:T('weather'),history:T('history'),
    analytics:T('analytics'),alerts:T('alerts'),settings:T('settings'),
    about:'About AquaFarm',admin:T('admin')};

  app.innerHTML=`<div class="shell">
    ${Sidebar()}
    <div class="main">
      ${Topbar(TITLES[G.page]||'')}
      <div class="content">${(PAGES[G.page]||pDash)()}</div>
    </div>
  </div>`;

  requestAnimationFrame(()=>{
    if(G.page==='dashboard') initDashCH();
    if(G.page==='sensors')   initSensorCH();
    if(G.page==='weather')   initWeatherCH();
    if(G.page==='analytics') initAnalyticsCH();
  });
}

/* ── THEME & LANG ─────────────────────────────────────────── */
function toggleTheme(){ G.theme=G.theme==='dark'?'light':'dark'; render(); }
function setTheme(v){ G.theme=v; render(); }
function changeLang(l){ G.lang=l; render(); }

/* ── LIVE SENSOR SIMULATION ───────────────────────────────── */
setInterval(()=>{
  const s=G.sensor;
  const jit=(v,sp,mn,mx)=>Math.min(mx,Math.max(mn,+(v+(Math.random()-.5)*sp).toFixed(1)));
  s.m    =jit(s.m,1.4,20,95);
  s.t    =jit(s.t,.7,18,44);
  s.h    =jit(s.h,1.1,30,98);
  s.tank =jit(s.tank,.08,8,100);
  s.rain =jit(s.rain,.6,0,100);
  if(G.predMode==='sensor'){
    G.predIn={m:Math.round(s.m),t:Math.round(s.t),h:Math.round(s.h),tank:Math.round(s.tank),rain:Math.round(s.rain)};
  }
},5000);

/* ── EXPOSE GLOBALS ───────────────────────────────────────── */
Object.assign(window,{
  go,changeLang,toggleTheme,setTheme,
  doLogin,doRegister,quickLogin,doLogout,showForgot,
  toggleEye,livePwStr,liveMatch,
  setPredMode,syncPred,updPred,runPred,
  doCalc,updThr,exportCSV,
});

/* ── BOOT: restore remembered session ─────────────────────── */
(function boot(){
  try{
    const s=JSON.parse(localStorage.getItem('aqf_sess')||'null');
    if(s && Date.now()-s.ts<7*24*3600000){
      const found=getAllUsers().find(u=>u.username===s.u);
      if(found){ G.user={...found}; G.page='dashboard'; }
    }
  }catch(e){}
  render();
})();
</script>
